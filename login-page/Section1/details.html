<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Details</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .photo-gallery {
            margin-top: 30px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: var(--shadow);
        }

        .photo-gallery h2 {
            color: var(--primary-color);
            margin-bottom: 20px;
            text-align: center;
            position: relative;
            padding-bottom: 10px;
        }

        .photo-gallery h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: var(--secondary-color);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .gallery-item {
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            transition: var(--transition);
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .gallery-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
        }

        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #e74c3c;
            --text-color: #333;
            --light-bg: #f9f9f9;
            --shadow: 0 5px 15px rgba(0,0,0,0.1);
            --transition: all 0.3s ease;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-bg);
            color: var(--text-color);
            line-height: 1.6;
        }
        
        .details-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 30px;
            background: white;
            box-shadow: var(--shadow);
            border-radius: 10px;
            transition: var(--transition);
        }
        
        .details-container:hover {
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transform: translateY(-5px);
        }
        
        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.2rem;
            position: relative;
            padding-bottom: 10px;
        }
        
        h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background: var(--secondary-color);
        }
        
        .detail-item {
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(52, 152, 219, 0.1);
            border-left: 4px solid var(--secondary-color);
            border-radius: 0 4px 4px 0;
            transition: var(--transition);
        }
        
        .detail-item:hover {
            background: rgba(52, 152, 219, 0.2);
            transform: translateX(5px);
        }
        
        .detail-item strong {
            color: var(--primary-color);
            font-weight: 600;
        }
        
        .close-btn {
            display: block;
            width: 150px;
            margin: 30px auto 0;
            padding: 12px;
            background: var(--primary-color);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            transition: var(--transition);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .close-btn:hover {
            background: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }
        
        @media (max-width: 768px) {
            .details-container {
                margin: 20px;
                padding: 20px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="details-container">
        <h1 id="property-title">Property Details</h1>
        <div id="property-details">
            <!-- Details will be populated by JavaScript -->
        </div>
        <a href="#" class="close-btn" onclick="window.close()">Close Window</a>
    </div>

    <script>
        // Get parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        const title = urlParams.get('title');
        const details = JSON.parse(decodeURIComponent(urlParams.get('details')));

        // Populate the page
        document.getElementById('property-title').textContent = title + ' Details';
        
        const detailsContainer = document.getElementById('property-details');
        for (const [key, value] of Object.entries(details)) {
            const div = document.createElement('div');
            div.className = 'detail-item';
            div.innerHTML = `<strong>${key}:</strong> ${value}`;
            detailsContainer.appendChild(div);
        }

        // Add photo gallery if photos parameter exists
        if (urlParams.has('photos')) {
            const photos = JSON.parse(decodeURIComponent(urlParams.get('photos')));
            const galleryDiv = document.createElement('div');
            galleryDiv.className = 'photo-gallery';
            galleryDiv.innerHTML = '<h2>Additional Photos</h2><div class="gallery-grid"></div>';
            detailsContainer.appendChild(galleryDiv);

            const galleryGrid = galleryDiv.querySelector('.gallery-grid');
            photos.forEach(photo => {
                const imgDiv = document.createElement('div');
                imgDiv.className = 'gallery-item';
                imgDiv.innerHTML = `<img src="${photo}" alt="Property photo">`;
                galleryGrid.appendChild(imgDiv);
            });
        }
    </script>
</body>
</html>
